meta:
  slug: temperature-controlled-room
  building: A28
  rooms: ["116B"]
  name: "SAIL Temperature Controlled Room (116B)"
  title: "Occupancy and Work Within the SAIL Temperature Controlled Room (Room 116B)"
  status: Draft
  version: "2.0"
  version_issue_date: "2026-07-16"
  description: "Risk assessment and safe work procedure for occupancy of and work within the SAIL temperature controlled room (Room 116B), a sealed room with recirculating air conditioning, covering carbon dioxide accumulation, working in isolation, and electric shock from flood water."
  key_hazards: "Carbon dioxide accumulation and asphyxiation, working in isolation in a sealed room, CO2 monitor or ventilation failure, electric shock from flood water"
  includes: "Mandatory door open rule, pre-entry checks, CO2 alarm response, flood and electric shock response, lone working notification, training requirements"
  faculty_school: "Faculty of Science — School of Physics (SAIL Labs)"
  prepared_by: "Chris Betters"
  supervisors:
    - "Sergio Leon-Saval"
    - "Chris Betters"
  issue_date: "2016-06-16"
  next_review_date: "2027-07-16"

ra:
  activity: |-
    - Entering and occupying the temperature controlled room
    - Extended work on optical and instrument hardware within the room
    - Brief access to check, start or stop equipment
    - Adjustment and monitoring of experiments requiring a thermally stable environment
    - Response to CO2, ventilation or flood alarms
    This document supersedes RA-SWP-A28-116B (initial issue 16/06/2016, current issue 26/04/2020).
    Research area: Sydney Astrophotonic Instrumentation Labs (SAIL).
  location: "Room 116B, Building A28, School of Physics, University of Sydney"
  persons_at_risk:
    - "Laboratory staff"
    - "Research students"
    - "Technicians"
    - "Visitors to the laboratory"
    - "Facilities and maintenance personnel"
    - "Cleaning staff"
  team:
    - "Sergio Leon-Saval"
    - "Barnaby Norris"
    - "Julia Bryant"
    - "Chris Betters"
  references:
    - "Work Health and Safety Act 2011 (NSW)"
    - "Work Health and Safety Regulation 2017 (NSW)"
    - "Safe Work Australia, Workplace Exposure Standards for Airborne Contaminants (2024) - carbon dioxide TWA 5,000 ppm (8-hour), STEL 30,000 ppm (15-minute)"
    - "Safe Work Australia, Confined Spaces Code of Practice (2020) - referenced as guidance only. Room 116B is a normally occupied workroom with a personnel door and is NOT a confined space under WHS Regulation 2017 Part 4.3. The code is cited only for its guidance on atmospheric monitoring and rescue planning, because the room shares the sealed, recirculating atmosphere characteristic that drives the CO2 hazard."
    - "AS 1668.2-2012 The use of ventilation and airconditioning in buildings, Part 2: Mechanical ventilation in buildings"
    - "AS/NZS 3000:2018 Electrical installations (Wiring Rules)"
    - "AS/NZS 3760:2022 In-service safety inspection and testing of electrical equipment"
    - "Safe Work Australia, Managing the Work Environment and Facilities Code of Practice (2018)"
    - "University of Sydney WHS policies and procedures, including working alone and after-hours guidance"
    - "SAIL General Optical and Laser Laboratory Safety risk assessment (general-lab-safety), which also covers Room 116B"
    - "Superseded document RA-SWP-A28-116B (26/04/2020)"
  risks:
    - task: "Extended work in the room with the door closed"
      hazards: "Excess carbon dioxide levels"
      harm: |-
        The room is sealed with recirculating air conditioning. Extended time in the room causes a slow
        build up of exhaled CO2, leading to:
        - Headaches and dizziness
        - Drowsiness and impaired judgement
        - Rapid breathing and confusion
        - Loss of consciousness
        - Asphyxiation in the extreme case
      controls: |-
        Engineering: CO2 monitor installed, triggers fresh air intake when levels increase.
        Engineering: Red mushroom panic button installed in the room to sound an alarm.
        Engineering: Temperature control by air recirculation.
        Administrative: General SAIL induction and specific 116B induction.
      current_rating: "Medium"
      additional_controls: |-
        - Main door MUST remain open whenever the room is occupied. This is the primary control.
        - If the door must be closed for thermal stability, personnel MUST leave the room.
        - Door-closed access limited to brief equipment checks only.
        - Evacuate immediately if the CO2 alarm sounds. Do NOT investigate first.
        - Warning signage on the door stating the door open rule and the CO2 risk.
        - Induction to cover the symptoms of CO2 exposure.
        - Scheduled CO2 sensor calibration and fresh air intake function test.
      residual_rating: "Low"
    - task: "CO2 monitor, alarm or fresh air intake fails while the room is occupied"
      hazards: "Failure of the primary atmospheric control; undetected CO2 accumulation"
      harm: |-
        - No warning of rising CO2
        - Occupant becomes drowsy or unconscious without warning
        - Delayed detection of a hazardous atmosphere
      controls: |-
        Engineering: CO2 monitor with automatic fresh air introduction.
        Engineering: Panic button independent of the CO2 system.
        Administrative: Building maintenance of HVAC plant.
      current_rating: "Medium"
      additional_controls: |-
        - The door open rule provides passive protection independent of the monitor.
        - Periodic verification that the sensor and fresh air intake actually operate (function test, NOT a power-on check).
        - Sensor calibration to the manufacturer schedule.
        - Any alarm activation, fault or sensor error reported to the supervisor and building manager, and logged.
        - The room MUST NOT be occupied for extended work while the CO2 system is known faulty or under maintenance.
        Residual risk remains Medium rather than Low: incapacitation in a sealed room retains a Major
        consequence even at Rare likelihood, because the failure removes the warning the occupant relies on.
      residual_rating: "Medium"
    - task: "Working alone in the room, particularly after hours"
      hazards: "Isolation within a sealed room; delayed discovery if incapacitated"
      harm: |-
        - Delayed emergency response if the occupant collapses
        - No assistance available
        - Consequences of any other incident (CO2, electric shock, injury) worsened by delay
      controls: |-
        Engineering: Red mushroom panic button installed in the room.
        Administrative: Notification of supervisor or appropriate person that work is occurring in the lab.
        Administrative: Building security and access controls, after-hours security patrols.
      current_rating: "Medium"
      additional_controls: |-
        - Door to remain open, maintaining line of sight and audibility to the corridor.
        - Confirm the panic button is functional and reachable from the work position before starting.
        - Mobile phone carried and accessible.
        - Buddy system or agreed check-in schedule for extended or after-hours work.
        - Do NOT work alone in the room if feeling unwell.
        - Panic button included in scheduled function testing.
        Residual risk remains Medium rather than Low: a lone occupant who is incapacitated retains a Major
        consequence even at Rare likelihood, since the controls shorten the delay rather than remove it.
      residual_rating: "Medium"
    - task: "Door closed or latched while a person is inside"
      hazards: "Loss of the primary CO2 control; potential entrapment"
      harm: |-
        - Rapid loss of the door open protection
        - CO2 accumulation with an occupant present
        - Occupant unable to summon help if also incapacitated
      controls: |-
        Engineering: Panic button installed in the room.
        Engineering: CO2 monitor and automatic fresh air intake.
        Engineering: Door openable from the inside.
      current_rating: "High"
      additional_controls: |-
        - Signage on BOTH faces of the door: do not close while occupied.
        - Physical door retention (hold-open device or wedge) while the room is occupied.
        - Others MUST check the room is unoccupied before closing the door.
        - Induction to cover the door rule explicitly.
        - Verify the door can be opened from the inside as part of periodic checks.
        Residual risk remains Medium rather than Low: the consequence of an occupant sealed in the room
        stays Major even once likelihood is reduced to Rare.
      residual_rating: "Medium"
    - task: "Flood water on the laboratory floor"
      hazards: "Electric shock"
      harm: |-
        Flood water from a failed drainage system could lead to electrical systems coming into contact
        with water:
        - Electric shock
        - Electrocution
        - Burns
        - Slips and falls on wet flooring
        - Damage to equipment
      controls: |-
        Engineering: Socket outlets protected by RCD.
        Engineering: Socket outlets mounted above floor level.
        Engineering: Building electrical installation to AS/NZS 3000.
      current_rating: "Medium"
      additional_controls: |-
        - Flood emergency procedure including evacuation of affected areas.
        - Do NOT enter the room if standing water is present. Isolate power at the distribution board first.
        - Report water ingress or drainage faults immediately.
        - Keep floor-standing equipment, leads and power boards clear of the floor where practicable.
        - RCD testing and equipment test and tag current.
      residual_rating: "Low"
