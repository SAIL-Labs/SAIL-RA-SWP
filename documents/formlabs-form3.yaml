    - "Safety Data Sheet - Formlabs Black V4.1 Resin (media.formlabs.com/m/75811facbde95dad/original/-ENAU-Safety-Data-Sheet-Black-V4-1-Resin.pdf)"
    - "Formlabs resin technical specifications and data sheets (formlabs.com/3d-printers/resin/tech-specs/#data-sheets)"
