ra:
  activity: |-
    The Form 3 is a commercial, precision tool intended for use in the additive manufacture of
    end-user supplied designs from photopolymer resin. The final performance characteristics of
    cured photopolymer resin may vary according to compliance with the instructions for use,
    application, operating conditions, material combined with, end use, or other factors.

    This RA/SWP covers operation of the SAIL Form 3, including:
    - Print preparation (file preparation in PreForm, resin cartridge and tank installation)
    - Printing
    - Finishing - washing printed parts in isopropyl alcohol (IPA), drying and curing
    - Cleanup and waste disposal
    - Routine user maintenance and inspection

    TODO: The source document is titled "Formlabs 3" but the operating and maintenance text throughout
    refers to the "Form 3B" (the biocompatible variant). Confirm which model is installed in A28-116C
    and make the model designation consistent before approval.
