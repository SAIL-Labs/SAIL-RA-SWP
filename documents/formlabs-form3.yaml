    - "ChemSupply isopropyl alcohol SDS (shop.chemsupply.com.au/documents/PA0131CH5R.pdf)"
    - |-
      CHEMICALS INVOLVED:
      - UV curable resins - MUST NOT come into contact with the skin. Respect Formlabs resin like any
        household chemical. Follow standard chemical safety procedures and Formlabs resin handling
        instructions. Formlabs resin is NOT approved for use with food, drink, or medical applications
        on the human body. Refer to the SDS for each specific resin for more detail.
      - IPA is used in the cleaning process. Formlabs does not manufacture IPA - consult the chemical
        manufacturer or supplier for detailed safety information and carefully follow the safety
        instructions provided with the IPA purchased. IPA is HIGHLY FLAMMABLE, even explosive, and MUST
        be kept away from heat, fire, or sparks. Any containers holding IPA MUST be kept closed or
        covered when not in use. Wear protective gloves and ensure good ventilation when working with IPA.
