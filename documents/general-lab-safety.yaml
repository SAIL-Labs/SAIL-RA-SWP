  description: "Foundational risk assessment and safe work procedures covering general safety requirements for all SAIL laboratory areas including optical hazards, lab access, conduct, room-specific hazards, daily procedures, and emergency protocols"
  key_hazards: "Optical hazards, laser exposure, slips/trips/falls, manual handling, room-specific hazards (CO2, sharps), general lab conduct"
  includes: "Access requirements, induction content, daily procedures, emergency protocols, visitor management, incident reporting"
