  competency:
    - |-
      MANDATORY TRAINING 1 - SAIL LAB GENERAL LOCAL INDUCTION (must be completed before laboratory access):
      Duration approximately 1.5-2 hours (presentation + laboratory tour). Assessment method: attendance and participation in full induction session; demonstration of understanding through Q&A during session; practical demonstration (locate emergency equipment, identify door signage); no formal written test required; assessor must be satisfied trainee understands all safety-critical information.
    - |-
      INDUCTION CONTENT - HAZARD AWARENESS:
      - Optical hazards (bright sources, specular reflections)
      - Laser hazards (general awareness - equipment-specific training separate)
      - Room-specific hazards (Room 116B CO2, fibre lab sharps)
      - Electrical hazards (240V equipment, visual inspections)
      - Chemical hazards (general awareness - specific training for chemical work)
      - Mechanical hazards (manual handling, moving parts)
      - Slips, trips, falls (cable management, housekeeping)
      - Fire hazards
    - |-
      INDUCTION CONTENT - LABORATORY ACCESS AND CONDUCT:
      - Swipe card access system
      - Door signage (hazards, PPE requirements, authorised entry)
      - Undergraduate supervision requirements
      - Sign-in/sign-out procedures
      - Visitor management
      - Working alone policies
      - Housekeeping standards
      - No food/drink policy
    - |-
      INDUCTION CONTENT - EMERGENCY PROCEDURES:
      - Building evacuation (fire alarm response)
      - Fire emergency (fighting small fires, when to evacuate)
      - Room 116B CO2 alarm response
      - Chemical spill response
      - First aid and injury response
      - Emergency contact numbers
      - Location of emergency equipment (extinguishers, first aid, eyewash)
      - Assembly points
    - |-
      INDUCTION CONTENT - SAFE WORK PRACTICES:
      - Pre-access checks (door signage, PPE)
      - Setting up workspace safely
      - Optical work safety (avoiding direct beam exposure, managing reflections)
      - Cable management and trip hazard prevention
      - Manual handling techniques
      - Chemical handling basics (SDS, PPE, ventilation)
      - Equipment inspection (cords, test tags)
      - Leaving laboratory safely
    - |-
      INDUCTION CONTENT - LABORATORY TOUR:
      - Walk through of laboratory areas (116B, 116C, 121A-D, 120, 218G-H-I)
      - Location of emergency equipment: fire extinguishers (types and locations); first aid kit (near parents room); portable eyewash stations (Rooms 121D, 218G); emergency exits and assembly points; emergency contact information displays
      - Room-specific features: Room 116B CO2 sensor and alarm; laser interlock systems; 3D printer room ventilation
      - Location of reference materials (RAs, SWPs, SDS)
    - |-
      INDUCTION CONTENT - DOCUMENTATION AND REPORTING:
      - Incident reporting via RiskWare
      - Equipment defect reporting
      - When to report to supervisor
      - Maintaining training records
    - |-
      MANDATORY TRAINING 2 - LASER OPERATOR CERTIFICATE (for laser work):
      Required for: all personnel working with lasers; all personnel working in areas where lasers are operated; anyone who may be exposed to laser radiation.
      Content: laser safety principles and regulations; laser classification system; biological effects of laser radiation; laser safety controls (engineering, administrative, PPE); laser safety eyewear selection and use; emergency procedures for laser exposure.
      Provider: external certified laser safety training provider, OR internal certified laser safety instructor (if available).
      Documentation: certificate must be uploaded to Faculty "My Inductions Dashboard"; copy provided to supervisor; valid indefinitely (unless changed by university policy).
      NOTE: Laser Operator Certificate is GENERAL laser safety awareness. Equipment-specific laser systems require ADDITIONAL training via equipment-specific RA/SWP.
    - |-
      MANDATORY TRAINING 3 - EQUIPMENT-SPECIFIC TRAINING (before using any equipment):
      - Read equipment-specific RA/SWP thoroughly
      - Complete equipment-specific training (hands-on demonstration)
      - Competency assessment by authorised assessor
      - Sign-off on equipment-specific competency sheet
      - Name added to authorised users list for that equipment
      Examples: Bambu Lab H2D Laser Edition (RA-A28-SAIL-bambu-h2d, SWP-A28-SAIL-bambu-h2d); CMS Combiner Manufacturing System (RA-A28-SAIL-218G-3sae-cms, SWP-A28-SAIL-218G-3sae-cms); Form 3 printers; specific laser systems (Class 3B, Class 4); high voltage equipment; other specialised equipment
    - |-
      MANDATORY TRAINING 4 - SPECIALIST ACTIVITY TRAINING (as applicable):
      - Fibre Optics Handling: required for fibre cleaving, splicing, handling; follow Fibre Optics Handling RA/SWP; training on sharps safety, disposal, eyewash use
      - Chemical Handling: required for use of solvents, adhesives, hazardous chemicals; follow Chemical Handling RA/SWP; training on SDS interpretation, PPE selection, spill response
      - Electrical Work: required for electrical repairs, modifications, high voltage work; follow Electrical Safety RA/SWP; may require formal electrical qualifications for some work
    - |-
      COMPETENCY ASSESSMENT - THEORY COMPONENT (Q&A session or discussion covering):
      - Identification of hazards in SAIL laboratories
      - Understanding of door signage and PPE requirements
      - Emergency procedures (evacuation, fire, CO2 alarm)
      - Room 116B door closure prohibition
      - Undergraduate supervision requirements
      - When to report incidents or defects
      - Location of emergency equipment
    - |-
      COMPETENCY ASSESSMENT - PRACTICAL COMPONENT (trainee demonstrates):
      - Ability to read and interpret door signage
      - Location of fire extinguisher nearest to work area (and type)
      - Location of first aid kit
      - Location of emergency exits and assembly points
      - Location of portable eyewash (if working in fibre labs)
      - Understanding of Room 116B CO2 hazard (if applicable)
      - Appropriate PPE for laboratory entry
    - |-
      COMPETENCY ASSESSMENT - PASS CRITERIA:
      - Trainee demonstrates clear understanding of all safety-critical topics
      - Trainee can locate all emergency equipment
      - Trainee understands when and how to respond to emergencies
      - Trainee understands room-specific hazards relevant to their work
      - Assessor is satisfied trainee can work safely in SAIL laboratories
      If not yet competent: additional discussion and clarification; re-walk laboratory tour; reassess understanding; if significant gaps, schedule additional training session. Do NOT grant access until competent.
    - |-
      ONGOING REQUIREMENTS - REFRESHER TRAINING:
      - Every 3 years for all laboratory users
      - Can be abbreviated refresher (1 hour) if no significant changes
      - Full re-induction if major changes to laboratories or procedures
      - Earlier refresher if: incident involving the person; unsafe practices observed; procedures significantly updated; extended absence from laboratories (>2 years)
    - |-
      ONGOING REQUIREMENTS - OTHER:
      - Equipment-specific refreshers: as specified in equipment-specific RA/SWP (typically annually or when procedures updated)
      - Laser Operator Certificate: valid indefinitely (current university policy); re-certification required if policy changes
      - Continuous improvement: participate in safety meetings and discussions; report hazards and near-misses; contribute to procedure improvements; stay informed of safety updates
    - |-
      RECORD KEEPING (training records maintained by supervisors):
      - Date of SAIL Lab General Local Induction; assessor name and signature
      - Laser Operator Certificate (copy or confirmation of upload to Faculty system)
      - Equipment-specific training dates and sign-offs
      - Refresher training dates
      - Authorised users lists (by equipment)
      Records retention: minimum 7 years (WHS regulation requirement); active personnel records updated regularly; training database or spreadsheet maintained; access to records for audits and compliance checks
    - |-
      AUTHORISED ASSESSOR REQUIREMENTS (to be authorised as an induction assessor, staff must):
      - Have completed SAIL Lab General Local Induction themselves
      - Be thoroughly familiar with all SAIL laboratory areas and hazards
      - Understand emergency procedures and equipment locations
      - Have authority to grant laboratory access
      - Be competent in identifying unsafe practices
      - Be approved by laboratory management or School of Physics Safety Officer
      Additional authorised assessors may be added with approval from the listed supervisors.
    - |-
      ASSESSMENT PROCESS (FOR ASSESSORS):
      1. Schedule induction session (allow 1.5-2 hours; ensure laboratory areas accessible for tour)
      2. Deliver induction content: present all required topics; conduct laboratory tour; demonstrate emergency equipment locations; discuss room-specific hazards relevant to trainee's work; allow time for questions
      3. Assess competency: Q&A on safety-critical topics; practical demonstration (locate emergency equipment); verify understanding; identify gaps requiring additional training
      4. If competent: sign trainee off on sign-off sheet; add trainee to authorised users list; arrange swipe card access activation; provide trainee with copy of RA-A28-SAIL-general-lab-safety and SWP-A28-SAIL-general-lab-safety; inform trainee of additional requirements (Laser Operator Certificate, equipment-specific training)
      5. If not yet competent: provide additional training and clarification; schedule reassessment; do NOT grant access until competent
      6. Record keeping: maintain training record (name, date, assessor, outcome); update authorised users list; file signed competency sheet; track refresher training due dates
    - |-
      AUTHORISED USERS LIST MAINTENANCE:
      - Maintained by laboratory supervisors
      - Updated when new users inducted and when users leave (access removed)
      - Reviewed annually to ensure current
      - Available for reference (who has access to which areas)
    - |-
      DOCUMENT REVIEW SCHEDULE (this SWP must be reviewed):
      - Every 3 years (by February 2029)
      - After any serious incident in SAIL laboratories
      - When laboratory layouts or room uses change
      - When new hazards are identified
      - When procedures change significantly
      - When Australian Standards or university policies are updated
      - When specialist RAs/SWPs are developed (Fibre, Chemical, Electrical)
      Review process: supervisors review document for accuracy and completeness; consult laboratory users for feedback; update to reflect current practices and hazards; retrain all users if major changes implemented; issue new version and update sign-off sheets
