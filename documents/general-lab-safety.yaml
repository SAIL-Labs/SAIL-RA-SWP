ra:
  activity: |-
    - General work in optical and laser laboratories
    - Optical alignment and experimentation
    - Equipment setup and operation
    - Laboratory access and conduct
    - Movement around laboratory spaces
    - Use of optical benches and equipment
    - General laboratory housekeeping

    SCOPE: This is a foundational risk assessment covering general laboratory safety across all SAIL laboratory areas. Equipment-specific and activity-specific hazards are covered by separate RAs/SWPs (individual equipment RAs/SWPs, Fibre Optics Handling, Chemical Handling, Electrical Safety). All laboratory users must comply with BOTH this general RA and any applicable specialist RAs/SWPs for their specific activities.
  location: |-
    SAIL Laboratory Areas:
    - Room 116B (temperature-controlled room)
    - Room 116C (3D printing room)
    - Room 121A (breakout/meeting room)
    - Rooms 121B-C (standard optical labs)
    - Room 121D (fibre fabrication lab)
    - Room 120 (standard optical lab)
    - Rooms 218G-H-I (fibre fabrication and optical labs)

    School of Physics, University of Sydney
  persons_at_risk:
    - "Academic staff and researchers"
    - "PhD and Masters students"
    - "Undergraduate students (supervised)"
    - "Visiting researchers"
    - "Contractors performing maintenance"
    - "Laboratory visitors"
    - "Cleaning staff"
  team:
    - "Chris Betters (Laboratory Supervisor)"
    - "Sergio Leon-Saval (Laboratory Supervisor)"
    - "Laboratory technical staff"
    - "Laboratory users and researchers"
    - "School of Physics Safety Officer"
    - "Facilities maintenance personnel"
  references:
    - "Work Health and Safety Act 2011"
    - "Work Health and Safety Regulation 2017"
    - "AS/NZS 2243.1:2005 Safety in laboratories - Planning and operational aspects"
    - "AS/NZS 2243.2:2006 Safety in laboratories - Chemical aspects"
    - "AS/NZS 2243.10:2004 Safety in laboratories - Storage of chemicals"
    - "AS/NZS IEC 60825.1:2014 Safety of laser products - Equipment classification and requirements"
    - "AS/NZS 4801:2001 Occupational health and safety management systems"
    - "AS/NZS 1337.1:2010 Eye and face protection - Eye protectors for occupational applications"
    - "University of Sydney WHS policies and procedures"
    - "University of Sydney Laboratory Safety Manual"
    - "School of Physics Local Safety Procedures"
    - "Manufacturer documentation for installed equipment and safety systems"
    - "Building management and emergency procedures"
  risks:
    - task: |-
        LABORATORY ACCESS AND GENERAL CONDUCT:
        Unauthorised or inadequately trained personnel accessing laboratory areas
      hazards: "Unauthorised access, inadequate training"
      harm: |-
        - Exposure to hazards without understanding risks
        - Incorrect operation of equipment
        - Inability to respond to emergencies
        - Injury to self or others
        - Damage to equipment
      controls: |-
        - Swipe card access control
        - Access only granted after completing SAIL Lab General Local Induction
        - Authorised entry signage on doors listing risks and PPE requirements
        - Supervisor approval required for access
      current_rating: "Medium"
      additional_controls: |-
        - Mandatory SAIL Lab General Local Induction before access granted
        - Maintain authorised users list
        - Regular review of access permissions
        - Visitors must be signed in and supervised
        - Induction records maintained
        - Annual refresher training for infrequent users
      residual_rating: "Low"
    - task: |-
        LABORATORY ACCESS AND GENERAL CONDUCT:
        Unsupervised undergraduate students
      hazards: "Inadequate supervision, inexperience"
      harm: |-
        - Exposure to hazards beyond competency level
        - Incorrect equipment operation
        - Inability to recognise dangerous situations
        - Delayed response to emergencies
      controls: |-
        - University policy requiring supervision
        - Laboratory supervisor oversight
        - Sign-in procedures
      current_rating: "High"
      additional_controls: |-
        - MANDATORY: Undergraduates must be supervised at all times
        - Supervisor must be physically present in laboratory
        - Supervisor responsible for ensuring safe practices
        - Sign-in/sign-out log maintained
        - Clear supervision protocols documented
        - Supervisors must be trained and competent
      residual_rating: "Low"
    - task: |-
        LABORATORY ACCESS AND GENERAL CONDUCT:
        Poor housekeeping and laboratory conduct
      hazards: "Cluttered workspace, equipment left running unattended, food/drink in lab"
      harm: |-
        - Slips, trips, and falls
        - Fire hazards from clutter
        - Contamination of experiments
        - Chemical spills
        - Equipment damage
        - Cross-contamination
      controls: |-
        - Laboratory rules and guidelines
        - Regular cleaning schedules
        - Designated eating areas outside labs
      current_rating: "Medium"
      additional_controls: |-
        - No food or drink in laboratories
        - Clear desk policy - return equipment to storage
        - Cable management and trip hazard awareness
        - Regular housekeeping inspections
        - Waste disposal procedures followed
        - Equipment not left running unattended unless specifically approved
        - Spills cleaned immediately
      residual_rating: "Low"
    - task: |-
        OPTICAL HAZARDS:
        Exposure to bright light sources (alignment lasers, LEDs, lamps, broadband sources)
      hazards: "Optical radiation, bright visible light"
      harm: |-
        - Temporary flash blindness
        - Eye strain and fatigue
        - Retinal damage from extended exposure
        - Dazzle affecting ability to see hazards
        - Headaches and discomfort
      controls: |-
        - Warning labels on equipment
        - Controlled access to powered equipment
        - General laboratory lighting
      current_rating: "Medium"
      additional_controls: |-
        - Never look directly into beam or light source
        - Use beam blocks and shutters when not actively aligning
        - Use viewing cards or cameras for beam visualisation
        - Appropriate safety glasses/goggles when required
        - Limit exposure duration during alignment
        - Work at lowest intensity possible
        - Turn off sources when not in use
      residual_rating: "Low"
    - task: |-
        OPTICAL HAZARDS:
        Specular reflections from optical surfaces (mirrors, lenses, beam splitters, polished metal)
      hazards: "Unexpected reflected beams, multiple reflection paths"
      harm: |-
        - Eye injury from reflected beams
        - Exposure to beams from unexpected directions
        - Difficulty tracking all beam paths
        - Reflections at eye level
      controls: |-
        - Optical benches at comfortable working height
        - Standard laboratory practices
        - User training in optical safety
      current_rating: "Medium"
      additional_controls: |-
        - Remove reflective items (watches, jewellery, lanyards) before optical work
        - Be aware of all potential reflection surfaces
        - Use anodised or black optical mounts to minimise stray reflections
        - Position yourself to avoid reflected beam paths
        - Use beam dumps for unwanted beams
        - Never wear reflective clothing near active optical setups
        - Mark beam paths clearly
        - Work at sitting height when possible to keep beams below eye level
      residual_rating: "Low"
    - task: |-
        OPTICAL HAZARDS:
        Stray or scattered light in darkened laboratory environments
      hazards: "Reduced visibility, dark-adapted eyes more sensitive"
      harm: |-
        - Trips and falls in darkness
        - Collisions with equipment
        - Increased sensitivity to stray light exposure
        - Inability to see hazards
        - Difficulty reading safety labels
      controls: |-
        - Emergency lighting systems
        - Ambient light available when needed
      current_rating: "Medium"
      additional_controls: |-
        - Maintain adequate lighting for safe movement
        - Use red lighting for dark-adapted work (less disruptive)
        - Allow time for eyes to adjust when entering/leaving dark areas
        - Use torches/headlamps when needed
        - Keep walkways clear and well-defined
        - Ensure emergency exits remain visible
        - Never work alone in darkened laboratories
      residual_rating: "Low"
    - task: |-
        LASER HAZARDS (GENERAL - equipment-specific lasers have dedicated RAs):
        Exposure to laser radiation from alignment lasers and laser systems
      hazards: "Direct beam exposure, specular reflections"
      harm: |-
        - Retinal damage or burns (Class 3B, 4)
        - Permanent vision loss
        - Skin burns (Class 4)
        - Fire ignition (Class 4)
        - Temporary flash blindness (Class 2, 3R)
      controls: |-
        - Equipment-specific laser RAs and SWPs
        - Laser warning signage on doors
        - Some laboratories have interlock systems
        - Classification labels on laser equipment
      current_rating: "High"
      additional_controls: |-
        - MANDATORY: Laser Operator Certificate required for all personnel working with or near lasers
        - Comply with equipment-specific laser RA/SWP
        - Appropriate laser safety eyewear for wavelength and class
        - Never look into beam or at specular reflections
        - Use lowest power necessary during alignment
        - Beam path at or below sitting height where possible
        - Laser safety eyewear worn during operation of Class 3B/4 lasers
        - Respect laser interlock systems - never bypass
        - Room signage indicates laser in use
        - Curtains or barriers to prevent exposure to adjacent areas
      residual_rating: "Low"
    - task: |-
        LASER HAZARDS (GENERAL - equipment-specific lasers have dedicated RAs):
        Laser interlocks bypassed or defeated
      hazards: "Exposure to laser radiation without safety systems active"
      harm: |-
        - Unexpected laser exposure during room entry
        - Exposure to Class 3B/4 radiation
        - Multiple personnel exposed
        - Severe eye or skin injury
      controls: |-
        - Interlock systems on some laboratory doors
        - Warning signage
        - Laboratory procedures prohibiting bypass
      current_rating: "Very High"
      additional_controls: |-
        - NEVER bypass or defeat laser interlocks
        - Interlocks must be functional before laser operation
        - Report faulty interlocks immediately
        - Do not operate lasers if interlocks not working
        - Disciplinary action for intentional bypass
        - Regular testing of interlock systems
        - Alternative controls if interlock maintenance required (laser lockout)
      residual_rating: "Low"
    - task: |-
        ROOM-SPECIFIC HAZARDS:
        Working in Room 116B (temperature-controlled with CO2 risk)
      hazards: "Elevated carbon dioxide levels, oxygen displacement"
      harm: |-
        - Asphyxiation
        - Headaches and dizziness
        - Confusion and impaired judgment
        - Loss of consciousness
        - Hypercapnia (CO2 poisoning)
        - Death in extreme cases
      controls: |-
        - CO2 sensor and monitoring system installed
        - Automatic fresh air introduction when elevated CO2 detected
        - Alarm system for high CO2 levels
        - Temperature control via air recirculation system
      current_rating: "High"
      additional_controls: |-
        - NEVER work in Room 116B with door closed
        - Door must remain open during occupancy
        - If door must be closed (temperature control), personnel must leave room
        - Monitor CO2 alarm system - evacuate if alarm sounds
        - Limit time in room when door closed (access only to check equipment)
        - Buddy system recommended for work in 116B
        - Understand symptoms of CO2 exposure
        - Report any alarm activations or sensor faults immediately
        - Regular sensor calibration and maintenance
        - Warning signage on door regarding CO2 risk and door policy
      residual_rating: "Low"
    - task: |-
        ROOM-SPECIFIC HAZARDS:
        Work in fibre fabrication labs (121D, 218G)
      hazards: "Sharps hazards from cleaved fibre ends"
      harm: |-
        - Puncture wounds to hands, fingers, eyes
        - Fibre fragments embedded in skin
        - Infection from contaminated sharps
        - Eye injury from fibre fragments
      controls: |-
        - Dedicated fibre fabrication areas
        - Portable eyewash stations in fibre labs
        - Fibre disposal containers
      current_rating: "Medium"
      additional_controls: |-
        - Follow Fibre Optics Handling RA/SWP (dedicated document)
        - Appropriate sharps containers for fibre waste
        - Never handle fibre ends carelessly
        - Dispose of cleaved fibres immediately
        - Safety glasses mandatory during fibre cleaving
        - Inspect hands and work area for fibre fragments
        - First aid procedures for fibre injuries
        - Portable eyewash readily accessible
      residual_rating: "Low"
    - task: |-
        ROOM-SPECIFIC HAZARDS:
        Work in 3D printing room (116C)
      hazards: "Specific to 3D printers (fumes, thermal, mechanical)"
      harm: "See individual equipment RAs"
      controls: |-
        - Bambu Lab H2D RA/SWP (RA-A28-SAIL-bambu-h2d)
        - Form 3 printer RAs/SWPs
        - Dedicated 3D printing room with ventilation
      current_rating: "Medium"
      additional_controls: |-
        - NOTE: Current risk rating varies by printer - refer to individual equipment RAs
        - Follow equipment-specific RA/SWP for each printer
        - Room ventilation adequate for printing operations
        - Equipment-specific training required
      residual_rating: "Low"
    - task: |-
        MECHANICAL HAZARDS:
        Manual handling of heavy optics, equipment, optical tables
      hazards: "Heavy items, awkward shapes, precision equipment"
      harm: |-
        - Back strain and musculoskeletal injuries
        - Crushed fingers or toes
        - Dropped equipment causing damage
        - Foot injuries from falling objects
        - Hernias from improper lifting
      controls: |-
        - Mechanical lifting aids available
        - Trolleys and carts in some areas
        - Standard laboratory furniture height
      current_rating: "Medium"
      additional_controls: |-
        - Use mechanical aids (trolleys, hoists) for heavy items (>15 kg)
        - Two-person lift for awkward or heavy items
        - Proper lifting technique (bend knees, straight back, load close to body)
        - Closed-toe shoes mandatory in all laboratories
        - Plan lift route before moving items
        - Ask for assistance when needed
        - Steel-toe boots recommended for moving heavy optical tables or equipment
        - Clear pathway before moving heavy items
        - Use appropriate PPE (gloves for grip, not for heavy lifting)
      residual_rating: "Low"
    - task: |-
        MECHANICAL HAZARDS:
        Moving parts on optical stages, translation mounts, rotation mounts
      hazards: "Motorised stages, manual adjustment screws, rotating components"
      harm: |-
        - Pinch points crushing fingers
        - Entanglement with rotating parts
        - Impact injuries from unexpected motion
        - Equipment damage from collisions
      controls: |-
        - Emergency stops on motorised equipment
        - Guards on some equipment
        - Standard operating procedures
      current_rating: "Low"
      additional_controls: |-
        - Keep hands clear of moving parts during operation
        - Emergency stop accessible and known
        - Be aware of motorised stage motion before activation
        - Remove loose clothing, jewellery, lanyards before working near moving parts
        - Tie back long hair
        - Equipment-specific training for motorised systems
        - Stop motion before adjusting or clearing obstacles
        - Appropriate speed settings for manual operation
      residual_rating: "Low"
    - task: |-
        MECHANICAL HAZARDS:
        Sharp edges on optical mounts, equipment housings, metal components
      hazards: "Machined metal parts, mounting hardware, corners"
      harm: |-
        - Cuts and lacerations to hands
        - Torn gloves or clothing
        - Bleeding
        - Infection if not treated
      controls: |-
        - Standard laboratory equipment design
        - First aid kit available on level
      current_rating: "Low"
      additional_controls: |-
        - Handle optical components and mounts carefully
        - Inspect equipment for sharp edges or burrs
        - Wear appropriate gloves when handling rough metal parts (not during optical alignment)
        - Deburr sharp edges where possible
        - First aid available for minor cuts
        - Wash cuts immediately and apply dressing
      residual_rating: "Low"
    - task: |-
        SLIPS, TRIPS, AND FALLS:
        Trailing cables, equipment on floor, cluttered walkways
      hazards: "Power cables, fibre optic cables, equipment placement"
      harm: |-
        - Trips and falls causing injury
        - Sprains and fractures
        - Head injuries from falling onto equipment
        - Pulled muscles
        - Equipment damage from falls
      controls: |-
        - Generally organised laboratory spaces
        - Optical benches and tables for equipment storage
      current_rating: "Medium"
      additional_controls: |-
        - Cable management: secure cables along walls or overhead
        - Use cable protectors where cables cross walkways
        - Keep walkways and exits clear at all times
        - Store equipment on benches, not on floor
        - Return unused equipment to storage areas
        - Report trip hazards immediately
        - Good housekeeping practices
        - Adequate lighting in all work areas
        - Mark permanent cable routes with tape or warning signs
      residual_rating: "Low"
    - task: |-
        SLIPS, TRIPS, AND FALLS:
        Spills of liquids (water, solvents, optical fluids)
      hazards: "Wet floors, slippery surfaces"
      harm: |-
        - Slips and falls
        - Impact injuries
        - Chemical exposure from spill contact
        - Spread of contamination
      controls: |-
        - Spill response procedures
        - Cleaning materials available
        - Chemical Handling RA/SWP
      current_rating: "Medium"
      additional_controls: |-
        - Clean up spills immediately
        - Use "wet floor" warning signs if needed
        - Appropriate spill cleanup materials for chemical spills
        - Follow Chemical Handling RA/SWP for chemical spills
        - Report large or hazardous spills to supervisor
        - Wear appropriate PPE during cleanup
        - Dispose of contaminated materials correctly
        - Dry floor thoroughly after water spills
      residual_rating: "Low"
    - task: |-
        ELECTRICAL HAZARDS (GENERAL - specific equipment has dedicated RAs):
        Contact with 240V mains electricity from equipment, power supplies, extension cords
      hazards: "Exposed conductors, damaged cords, wet conditions"
      harm: |-
        - Electric shock
        - Electrocution
        - Burns from arc flash
        - Cardiac arrest
        - Secondary injuries from falls
      controls: |-
        - RCD protection on building circuits
        - Earthed equipment and power points
        - Electrical safety standards compliance
        - Test and tag program
      current_rating: "Medium"
      additional_controls: |-
        - Visual inspection of cords and equipment before use
        - Report damaged cords or equipment immediately
        - Never use electrical equipment in wet conditions
        - Do not overload power points or extension cords
        - Qualified electrician for all repairs
        - Follow Electrical Safety RA/SWP for specific procedures
        - Equipment test and tag current
        - Switch off and unplug equipment before internal access (if qualified)
        - Emergency switch-off locations known
      residual_rating: "Low"
    - task: |-
        CHEMICAL HAZARDS (GENERAL - specific chemicals have dedicated procedures):
        Use of solvents, adhesives, cleaning agents (isopropanol, acetone, optical adhesives)
      hazards: "Chemical exposure, vapour inhalation, skin contact"
      harm: |-
        - Skin irritation and dermatitis
        - Eye irritation or damage
        - Inhalation of vapours causing respiratory irritation
        - Fire hazard from flammable solvents
        - Allergic reactions
      controls: |-
        - Chemical handling procedures
        - SDS available
        - General laboratory ventilation
        - Designated chemical storage areas
      current_rating: "Medium"
      additional_controls: |-
        - Follow Chemical Handling RA/SWP (dedicated document)
        - Consult SDS before use
        - Appropriate PPE (gloves, safety glasses, lab coat)
        - Use in well-ventilated areas or fume cupboard
        - Store chemicals correctly (flammables cabinet, segregation)
        - Minimise quantities in use
        - Label all containers clearly
        - No naked flames near flammable solvents
        - Spill kit available and users trained
        - Wash hands after chemical handling
        - Portable eyewash in fibre labs
      residual_rating: "Low"
    - task: |-
        ENVIRONMENTAL AND ERGONOMIC HAZARDS:
        Prolonged sitting or standing during optical alignment
      hazards: "Static postures, repetitive fine movements"
      harm: |-
        - Musculoskeletal discomfort
        - Back and neck pain
        - Eye strain
        - Fatigue and reduced concentration
        - Repetitive strain injuries
      controls: |-
        - Adjustable chairs available
        - Workbenches at appropriate height
        - General laboratory ergonomics
      current_rating: "Low"
      additional_controls: |-
        - Take regular breaks during long alignment sessions
        - Alternate between sitting and standing
        - Adjust chair and bench height for comfort
        - Stretch and move periodically
        - Rest eyes by looking at distant objects
        - Report persistent discomfort to supervisor
        - Ergonomic assessment available if needed
      residual_rating: "Low"
    - task: |-
        ENVIRONMENTAL AND ERGONOMIC HAZARDS:
        Inadequate lighting for detailed optical work
      hazards: "Poor illumination, glare, shadows"
      harm: |-
        - Eye strain and headaches
        - Reduced accuracy in alignment
        - Increased error rate
        - Difficulty seeing hazards
        - Fatigue
      controls: |-
        - Building lighting systems
        - Task lighting available in some areas
      current_rating: "Low"
      additional_controls: |-
        - Use task lighting for detailed work
        - Adjust lighting to suit task (bright for assembly, dim for beam visualisation)
        - Report faulty lighting immediately
        - Position work to avoid glare and shadows
        - Take eye rest breaks during prolonged detailed work
      residual_rating: "Low"
    - task: |-
        ENVIRONMENTAL AND ERGONOMIC HAZARDS:
        Working alone in laboratory areas
      hazards: "Isolation, delayed emergency response"
      harm: |-
        - Delayed discovery if injured
        - Delayed emergency response
        - No assistance available
        - Psychological stress
      controls: |-
        - Building security and access controls
        - Emergency call points
        - After-hours security patrols
      current_rating: "Medium"
      additional_controls: |-
        - Buddy system encouraged, especially for higher-risk work
        - Inform supervisor or colleague when working after hours
        - Mobile phone accessible for emergency calls
        - Know location of emergency call points
        - Avoid high-risk activities when alone (e.g., working at height, Class 4 lasers)
        - Regular check-in procedures for extended solo work
        - Never work alone if feeling unwell
      residual_rating: "Low"
    - task: |-
        FIRE HAZARDS:
        Fire from electrical faults, flammable chemicals, laser ignition
      hazards: "Electrical equipment, solvents, laser sources"
      harm: |-
        - Burns and smoke inhalation
        - Building damage
        - Entrapment if exits blocked
        - Toxic fumes from burning materials
        - Loss of research equipment
      controls: |-
        - Fire detection systems
        - Fire extinguishers in various areas
        - Emergency exits marked
        - Building evacuation procedures
      current_rating: "Medium"
      additional_controls: |-
        - Know location of nearest fire extinguisher and type
        - Know emergency exit routes and assembly points
        - Do not block exits or extinguishers
        - Turn off equipment when not in use
        - Store flammable chemicals correctly (quantities limited, flammables cabinet)
        - Regular fire drills and training
        - Report fire hazards immediately
        - If fire: evacuate, activate alarm, call 000
        - Only fight small fires if safe to do so
        - Follow building fire warden instructions
      residual_rating: "Low"
  implementation_date: "February 2026"
