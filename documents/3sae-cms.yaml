  competency:
    - "MANDATORY TRAINING (must be completed and documented before authorisation; records maintained by supervisor):"
    - |-
      1. Manufacturer training course - 3SAE CMS multi-day on-site installation and operational training (TRN-01-0012):
      - Key learning outcomes: equipment overview and capabilities; safety systems and emergency procedures; control software operation (LabVIEW GUI); fusion splicing techniques and parameters; fibre tapering methods (bidirectional, single-direction, table-based); precision cleaving operation; electrode maintenance and replacement; troubleshooting and diagnostics; best practices for different fibre types and diameters
      - This training is ESSENTIAL - no substitutes; typically 2-3 days depending on applications; certificate of completion must be obtained
    - |-
      2. Laboratory safety induction:
      - General laboratory safety requirements; emergency procedures and assembly points; location and use of safety equipment (fire extinguishers, eyewash, first aid); chemical safety and SDS interpretation; incident reporting procedures; personal protective equipment requirements
    - |-
      3. Fibre optic handling and safety:
      - Optical fibre types and characteristics; safe handling techniques for glass fibres; hazards of glass fragments and cleaved ends; proper use of fibre handling tools; sharps disposal procedures; first aid for glass injuries; eye protection requirements
    - |-
      4. Electrical safety awareness:
      - Basic electrical hazards; lockout/tagout procedures; RCD function and testing; emergency power isolation; when to contact qualified electrician
      - Do NOT attempt electrical repairs without qualifications
    - |-
      5. High-temperature process safety:
      - Thermal hazards from plasma operation; safe distances and exclusion zones; cooling time requirements; recognition of hot surfaces; thermal burn first aid; heat-resistant glove use and limitations
    - |-
      6. Compressed air and vacuum systems safety:
      - Hazards of high-pressure systems; safe connection and disconnection procedures; pressure monitoring and relief; vacuum chamber operation; emergency shutdown procedures; compressed air safety (never direct at body)
    - |-
      THEORY ASSESSMENT (written test or oral examination):
      - Safety-critical knowledge (must achieve 100%): emergency stop procedure and location; emergency shutdown for different emergency types; thermal burn first aid procedures; glass injury prevention and first aid; electrical safety and when to evacuate; compressed air system hazards; when operation must stop (red flags); PPE requirements for different tasks
      - Equipment knowledge (minimum 80% pass mark): CMS capabilities and specifications; fusion splicing principles and parameters; tapering methods and applications; cleaving operation and quality assessment; software interface and control functions; electrode function and maintenance; cooling system purpose; vision system operation
      - Procedure knowledge (minimum 80% pass mark): pre-operation safety checks; fibre preparation and loading; splice parameter selection; taper program configuration; cleave positioning and execution; shutdown procedures; cleaning and waste disposal; documentation requirements
      - Failed assessment: review training materials, additional instruction, retest
    - |-
      PRACTICAL ASSESSMENT (supervised demonstration of competency):
      - Pre-operation procedures: complete all safety checks correctly; identify and test emergency stop; verify safety equipment presence; set up work area appropriately; don proper PPE
      - Basic operation: power up system correctly; inspect and install electrodes; load fibres into holders safely; achieve proper fibre alignment; execute a simple fusion splice; assess splice quality; properly shut down system
      - Advanced operation (as applicable to user's role): configure and execute taper program; perform precision cleave; use scanning functions; operate vacuum system (if required); create custom splice/taper parameters
      - Emergency response: demonstrate emergency stop activation; describe appropriate response to different emergency scenarios; locate and identify use of emergency equipment; demonstrate understanding of when to evacuate vs respond
      - Housekeeping: proper cleanup procedures; correct waste disposal; appropriate documentation in logbook
      - Assessor must observe ALL practical elements. Any safety-critical errors result in immediate FAIL - retraining and reassessment required. Minor non-safety errors: corrective instruction provided, reassessment of that element only. All elements must be demonstrated competently before authorisation granted.
    - |-
      REFRESHER TRAINING:
      - Annual refresher required for all authorised users, covering safety procedure updates, any equipment modifications or new capabilities, review of common errors or incidents, new techniques or best practices, and changes to Australian Standards or regulations
    - |-
      RETRAINING REQUIRED WHEN:
      - Any safety incident involving this equipment (immediate retraining); safety procedures are updated or changed; equipment is significantly modified or upgraded; unsafe practices are observed (remedial training); extended period of non-use (>6 months requires supervised refresher); new applications or techniques are implemented; user requests refresher training
    - |-
      SUPERVISION REQUIREMENTS (based on experience level):
      - Novice users (0-10 operations): direct supervision required at all times; supervisor must be experienced CMS user, present in same room and actively observing; each operation reviewed with supervisor before and after
      - Intermediate users (11-30 operations): experienced user must be present in laboratory; supervisor available for consultation; can perform routine operations independently with oversight; new or complex operations require direct supervision
      - Experienced users (31+ operations, demonstrated consistent competency): may operate independently; should consult with colleagues for unusual situations; responsible for mentoring and supervising novice users; maintain competency through regular use (minimum monthly)
    - |-
      MEDICAL MONITORING:
      - Not routinely required for CMS operation; eye examinations recommended for frequent users (discuss with OH&S); any health concerns affecting ability to operate safely must be reported to supervisor; vision requirements: must be able to view monitor clearly and distinguish alignment on camera views
    - |-
      RECORD KEEPING:
      - Training records: manufacturer training certificate (keep copy); laboratory safety induction completion; all supplementary training courses; refresher training attendance; maintained by supervisor, copies in personnel files
      - Competency assessments: theory assessment results; practical assessment checklist (signed by assessor); date competency achieved; any remedial training and reassessment; maintained by supervisor
      - Authorised users list: current list of all authorised users with date authorised and authorisation level; displayed prominently near equipment; updated when users added or removed; reviewed annually, remove inactive users
      - Individual operation logs: each user's operation count tracked in logbook to determine supervision requirements and identify when refresher training may be beneficial
      - Incident and near-miss records: any safety incidents involving specific users may trigger retraining requirements; pattern analysis for systemic issues; maintained by safety officer
    - |-
      COMPETENCY RENEWAL:
      - Annual competency review by supervisor considering frequency of equipment use, any incidents or near-misses, refresher training completion, observed work practices, and changes in procedures or equipment
      - Supervisor may require reassessment if concerns identified
      - Users who have not operated equipment in >12 months: full reassessment required
    - |-
      ASSESSOR REQUIREMENTS - to be authorised as an assessor, staff must:
      - Have completed 3SAE manufacturer training course; have minimum 100 successful operations on CMS (extensive experience); demonstrate expert-level knowledge of all CMS functions and safety systems; have no significant safety incidents on record; understand adult learning principles and assessment techniques; be approved by laboratory manager AND safety officer; maintain current competency through regular equipment use
    - |-
      ASSESSMENT PROCESS:
      1. Trainee completes all mandatory training modules and reviews this SWP and the associated Risk Assessment thoroughly
      2. Assessor conducts theory assessment (safety-critical questions must achieve 100%; general knowledge minimum 80%; if failed: review materials, additional instruction, retest)
      3. Assessor supervises practical demonstration using the practical assessment checklist (any safety-critical errors result in immediate fail; corrective instruction provided for minor errors)
      4. Assessor verifies competency in all required areas, confirms trainee understands limitations and when to seek help, and verifies trainee can respond appropriately to emergencies
      5. If competent: assessor signs trainee off on sign-off sheet; date of authorisation recorded; supervision requirements specified based on experience level; trainee added to authorised users list
      6. If not yet competent: specific deficiencies identified and communicated; additional training and supervised practice required; reassessment scheduled once trainee ready (may be partial reassessment of only deficient areas)
      7. Once signed off: name added to authorised users list displayed near equipment; laboratory manager notified
    - |-
      AUTHORISED USERS LIST MAINTENANCE:
      - Maintained by laboratory manager; displayed prominently near CMS equipment
      - Updated when new users are authorised, users move to different supervision levels, users become inactive, or users require retraining (temporarily suspend if safety issue)
      - Reviewed annually as part of SWP review
      - Records name, date authorised, authorisation level (Novice / Intermediate / Experienced), supervision required, authorised by, and notes
