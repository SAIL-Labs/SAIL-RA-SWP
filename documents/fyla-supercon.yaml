# Combined RA + SWP data for the Fyla Iceblink Supercontinuum Fibre Laser.
# Generated from issue #7 (photonic lantern wavefront sensing setup, room 121c).
# Render: python docgen/render.py documents/fyla-supercon.yaml

meta:
  slug: fyla-supercon
  building: A28
  rooms: ["121C"]
  name: "Fyla Iceblink Supercontinuum Fibre Laser"
  title: "Operation of the Fyla Iceblink Supercontinuum Fibre Laser in the Photonic Lantern Wavefront Sensing Setup"
  status: Draft
  version: "1.0"
  version_issue_date: "July 2026"
  description: "Risk assessment and safe work procedure for the Fyla Iceblink V3 supercontinuum fibre laser (450-2300 nm, greater than or equal to 3 W average power, Class 4) used as a filtered light source in a photonic lantern wavefront sensing setup, covering pulsed laser radiation across a predominantly invisible near-/short-wave infrared spectrum, fibre-handling, fire and electrical hazards."
  key_hazards: "Class 4 pulsed supercontinuum laser radiation (450-2300 nm, greater than or equal to 3 W average power, predominantly invisible near-/short-wave infrared), fibre-coupled beam hazards, fire risk, electrical hazards"
  includes: "Mandatory pre-operation safety checks, interlock and enclosure verification, PPE requirements, emergency procedures, training and competency requirements"
  faculty_school: "School of Physics (SAIL Labs)"
  prepared_by: "Chris Betters"
