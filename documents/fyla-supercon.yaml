  slug: fyla-supercon
  abbrev: FYLA-SC
  number: 1
  name: "Fyla Iceblink Supercontinuum Fibre Laser"
  title: "Operation of the Fyla Iceblink Supercontinuum Fibre Laser in the Photonic Lantern Wavefront Sensing Setup"
  status: Draft
  version: "1.0"
  version_issue_date: "July 2026"
  description: "Risk assessment and safe work procedure for the Fyla Iceblink supercontinuum fibre laser used as a filtered light source in a photonic lantern wavefront sensing setup, covering Class 4 pulsed laser radiation, invisible near-infrared emission, fibre-handling, fire and electrical hazards."
  key_hazards: "Class 4 pulsed supercontinuum laser radiation, invisible near-infrared emission, fibre-coupled beam hazards, fire risk, electrical hazards"
  includes: "Mandatory pre-operation safety checks, interlock and enclosure verification, PPE requirements, emergency procedures, training and competency requirements"
  faculty_school: "School of Physics (SAIL Labs)"
