ra:
  activity: |-
    - Operation of the Fyla Iceblink supercontinuum fibre laser as a light source for photonic lantern wavefront sensing
    - Free-beam alignment and optical setup adjustments
    - Fibre handling and connectorisation associated with the photonic lantern testbed
    - Routine filtered, enclosed operation for wavefront sensing measurements
  location: "Room 121c"
  persons_at_risk:
    - "Laboratory staff (1-3 permanent users)"
    - "Research students"
    - "Visitors to laboratory (escorted only)"
  team:
    - "Equipment users"
    - "Laser safety advisor"
    - "Supervisor"
  references:
    - "Work Health and Safety Act 2011 (NSW)"
    - "Work Health and Safety Regulation 2017 (NSW)"
    - "AS/NZS IEC 60825.1:2014 - Safety of laser products, Part 1: Equipment classification and requirements"
    - "AS/NZS IEC 60825.14 - Safety of laser products - A user's guide"
    - "AS/NZS 3000:2018 - Electrical installations (Wiring Rules)"
    - "Fyla Iceblink Supercontinuum Fibre Laser User Manual (Iceblink-v3.rev04.pdf)"
    - "University of Sydney WHS Laser Safety Policy and Procedures"
  risks:
    - task: "Free-beam laser operation during alignment and optical setup"
      hazards: "Class 4 pulsed supercontinuum laser radiation when the beam is not filtered or enclosed [VERIFY: exact wavelength range and average/peak output power from manufacturer specification]"
      harm: |-
        - Severe eye injury including retinal burns and permanent vision loss
        - Skin burns from direct or specularly reflected beam
        - Injury from unintentional beam reflections off optical components
      controls: |-
        - Safety interlock fitted for the free-beam configuration
        - Laser safety eyewear rated for the emission wavelength range, worn during free-beam work
        - Access to room 121c restricted during free-beam operation
      current_rating: "High"
      additional_controls: |-
        - Mandatory laser operator certification before free-beam access is granted
        - Confirm interlock function before each free-beam session
        - Enclose the beam path wherever alignment does not require free-beam access
        - [VERIFY: laser safety eyewear optical density (OD) rating required at the emission wavelength(s), confirmed against manufacturer output specification]
      residual_rating: "Low"
    - task: "Routine filtered, enclosed wavefront sensing operation"
      hazards: "Residual scattered or leaked supercontinuum radiation if the enclosure or filtering is compromised"
      harm: |-
        - Low-level eye exposure from stray light
        - Undetected beam leakage due to unnoticed enclosure damage
      controls: |-
        - Optical setup enclosed and filtered by design, negating the interlock requirement per engineering assessment
        - Enclosure integrity relied upon as the primary engineering control in this mode
      current_rating: "Medium"
      additional_controls: |-
        - Periodic visual inspection of enclosure and filter integrity before each session
        - Beam block/dump fitted at unused fibre or beam ports
        - Warning signage at room entry when the laser is powered
      residual_rating: "Low"
    - task: "Operating with the interlock or enclosure defeated or damaged"
      hazards: "Direct or scattered exposure to Class 4 pulsed laser radiation"
      harm: |-
        - Severe or permanent eye injury
        - Skin burns
        - Fire ignition of nearby materials
      controls: |-
        - Interlock circuit prevents free-beam emission when open
        - Absolute prohibition on defeating or bypassing the interlock
      current_rating: "Very High"
      additional_controls: |-
        - ABSOLUTE PROHIBITION on defeating, bypassing, or overriding the interlock
        - Immediate lock-out and tag-out if interlock or enclosure damage is found
        - Annual verification of interlock function by a qualified laser safety advisor
        - Residual rating of Low applies only while the prohibition is maintained - this scenario must not occur
      residual_rating: "Low"
    - task: "Invisible near-infrared component of the supercontinuum output"
      hazards: "Potential invisible beam component not perceivable by the unaided eye [VERIFY: confirm from manufacturer specification whether the emission spectrum extends into the near-infrared beyond approximately 700 nm]"
      harm: |-
        - Unnoticed direct or reflected exposure to invisible NIR radiation
        - Delayed recognition of an unsafe beam condition
      controls: |-
        - Beam confined to the enclosure/fibre during routine operation
        - Laser safety eyewear selected to attenuate across the full emission range, not only the visible portion
      current_rating: "Medium"
      additional_controls: |-
        - Use of a laser viewing card or NIR-sensitive card to verify the beam path before free-beam work
        - Training to specifically cover the invisible NIR hazard of supercontinuum sources
      residual_rating: "Low"
    - task: "Fibre handling, cleaving and connectorisation of the photonic lantern testbed"
      hazards: "Laser emission from an unterminated or damaged fibre end while the source is live"
      harm: |-
        - Eye injury from unexpected point-source emission at a fibre tip
        - Skin puncture from fibre shards during cleaving
      controls: |-
        - Standard practice of de-energising or shuttering the laser source before fibre connector work
      current_rating: "Medium"
      additional_controls: |-
        - Written procedure requiring the laser source is off or shuttered before any fibre is connected or disconnected
        - Disposal of fibre offcuts in a dedicated sharps-safe container
        - Fibre-handling component added to operator training
      residual_rating: "Low"
    - task: "Electrical operation of the laser source and internal pump diodes"
      hazards: "Electrical hazards from the 240V mains-powered laser source and internal high-current pump laser diodes"
      harm: |-
        - Electric shock
        - Electrocution
        - Internal component damage or fire from a fault condition
      controls: |-
        - Manufacturer-supplied enclosure and earthed chassis
        - Internal wiring inaccessible during normal operation
      current_rating: "Medium"
      additional_controls: |-
        - Regular electrical test and tag
        - No user access to internal components; service by a qualified technician only
        - Inspect power leads before each use
      residual_rating: "Low"
    - task: "Fire risk from a high peak power beam incident on absorptive materials"
      hazards: "Ignition of paper, tape, cabling, or other combustible material in the beam path"
      harm: |-
        - Fire
        - Smoke inhalation
        - Property damage
      controls: |-
        - Beam confined to an enclosed, filtered path during routine operation
        - Non-flammable optical mounts and beam dumps
      current_rating: "Medium"
      additional_controls: |-
        - Keep combustible material clear of the free-beam path
        - Fire extinguisher (CO2 or dry powder) accessible in the laboratory
        - Beam dump/terminator fitted at all unused output ports
      residual_rating: "Low"
    - task: "Specular reflections during optical alignment"
      hazards: "Uncontrolled reflections from lenses, mirrors, or fibre ferrules in the free-beam path"
      harm: |-
        - Unpredictable beam paths causing eye or skin exposure away from the intended beam line
      controls: |-
        - Laser safety eyewear worn during all free-beam alignment
        - Beam height controlled below or above eye level where practicable
      current_rating: "High"
      additional_controls: |-
        - Remove reflective jewellery and watches before free-beam alignment work
        - Use of alignment aids (IR viewer/beam profiler) rather than direct eye viewing
        - Reduce laser power to the minimum necessary during alignment where the source supports it [VERIFY: whether output power is adjustable/attenuable at the source]
      residual_rating: "Low"
    - task: "Unauthorised or untrained use of the laser"
      hazards: "Operation by personnel without laser operator certification"
      harm: |-
        - Increased likelihood of interlock defeat, incorrect PPE use, or unsafe free-beam work
      controls: |-
        - Access to room 121c restricted to authorised personnel
      current_rating: "High"
      additional_controls: |-
        - Authorised users list maintained and displayed at the equipment
        - Laser operator certification mandatory before any independent use
        - New users supervised until competency is signed off
      residual_rating: "Low"
    - task: "Extended or unattended operation during wavefront sensing measurements"
      hazards: "Enclosed, filtered laser left running for extended unattended periods"
      harm: |-
        - Delayed detection of an equipment fault, fire, or enclosure breach
      controls: |-
        - Enclosure and filtering intended to permit unattended filtered operation
      current_rating: "Low"
      additional_controls: |-
        - Periodic visual or remote check-ins during long unattended runs
        - Laser powered down at the end of each working day unless a specific case for continuous operation is documented and approved
      residual_rating: "Low"
