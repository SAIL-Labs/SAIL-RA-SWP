  competency:
    - |-
      MANDATORY TRAINING 1 - CLASS 4 LASER SAFETY TRAINING (must be completed before authorisation):
      - Understanding of laser classifications
      - Class 4 laser hazards (eye damage, burns, fire)
      - How safety systems work (interlocks, windows)
      - Consequences of defeating safety systems
      - Emergency procedures for laser exposure
      - Legal responsibilities
    - |-
      MANDATORY TRAINING 2 - EQUIPMENT-SPECIFIC TRAINING:
      - Bambu H2D operation (3D printing and laser functions)
      - Safety system verification procedures
      - Pre-operation checks
      - Software operation (Bambu Studio/Suite)
      - Material preparation and loading
      - Emergency stop and shutdown procedures
    - |-
      MANDATORY TRAINING 3 - FIRE SAFETY TRAINING:
      - Fire extinguisher operation (CO₂ and dry powder types)
      - Fire emergency procedures
      - Building evacuation procedures
    - |-
      MANDATORY TRAINING 4 - HAZARDOUS MATERIALS AWARENESS:
      - Reading and interpreting SDS
      - Prohibited materials (PVC, polycarbonate, etc.)
      - Fume hazards and controls
      - Material approval process
    - |-
      MANDATORY TRAINING 5 - FIRST AID (BASIC):
      - Thermal burns treatment
      - When to seek medical attention
      - Location of first aid equipment
    - |-
      COMPETENCY ASSESSMENT - THEORY:
      - Written test or oral examination covering: Class 4 laser hazards and safety systems; pre-operation safety checks; emergency procedures; prohibited materials; equipment limitations
      - Must achieve 100% on safety-critical questions
      - Minimum 80% overall pass mark
    - |-
      COMPETENCY ASSESSMENT - PRACTICAL:
      - Supervised practical demonstration of: complete pre-operation safety checks (including interlock testing); material preparation and approval process; equipment startup procedure; loading material safely; starting and monitoring a job (3D print or laser operation); emergency stop activation and reset; safe shutdown and cleanup
      - Assessor must observe and verify competency in all areas
      - Any safety-critical errors require retraining and reassessment
    - |-
      ONGOING REQUIREMENTS:
      - Annual refresher training on laser safety
      - Retraining required after any safety incident involving this equipment, when safety procedures are updated, if unsafe practices are observed, or after an extended period of non-use (more than 12 months)
      - Baseline eye examination recommended before authorisation
      - Periodic eye examinations if frequent laser user (consult occupational health)
    - |-
      ASSESSOR REQUIREMENTS (to be authorised as an assessor, staff must):
      - Have completed Class 4 laser safety training
      - Be competent and experienced in operation of the Bambu H2D
      - Understand all safety systems and their verification
      - Be familiar with emergency procedures
      - Have authority to authorise equipment use
      - Be approved by laboratory manager or safety officer
    - |-
      ASSESSMENT PROCESS:
      - Trainee completes all mandatory training modules
      - Assessor conducts theory assessment (written or oral)
      - Assessor supervises practical demonstration and verifies competency in all required areas
      - If competent: assessor signs trainee off on sign-off sheet and trainee is added to authorised users list
      - If not yet competent: additional training and practice required, then reassessment
    - |-
      AUTHORISED USERS LIST:
      - Maintained by laboratory manager and displayed near equipment
      - Updated when new users authorised; reviewed annually
      - Users removed if required retraining not completed
    - |-
      RECORD KEEPING:
      - Training records maintained by supervisor
      - Competency assessment documented on sign-off sheet
      - Training refresher dates tracked
