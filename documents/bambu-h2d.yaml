ra:
  activity: |-
    - 3D printing (FDM, dual nozzle, up to 350°C)
    - Laser engraving and cutting (Class 4, 455nm, 10W)
    - Material processing (wood, acrylic, leather, etc.)
    - Handling of printed parts and waste material
