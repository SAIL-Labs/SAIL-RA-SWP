    - "AS 2211.13-1999 - Safety of industrial laser equipment"
    - "AS/NZS 3000:2018 - Electrical installations (Wiring Rules)"
    - "AS 1940-2017 - Storage and handling of flammable and combustible liquids"
    - "AS 1668.2-2012 - The use of ventilation and airconditioning in buildings, Part 2: Mechanical ventilation in buildings"
    - "Safe Work Australia, Workplace Exposure Standards for Airborne Contaminants (2024)"
    - "Bambu Lab H2D Laser Safety Document and User Manual"
    - "University WHS policies and procedures for Class 4 lasers"
    - "US EPA, \"EPA Researchers Continue to Study the Emissions of 3D Printers\" (2025)"
    - "\"Exposure hazards of particles and VOCs emitted from material extrusion 3D printing\" (2023), Environment International"
    - "\"A global evaluation of exposure to pollutants in 3D printing\" (2025), Journal of Hazardous Materials Advances"
  risks:
    - task: "Laser engraving and cutting operations"
      hazards: "Class 4 laser radiation (455nm, 10W blue laser). Operates as Class 1 ONLY when all safety systems intact"
      harm: |-
        - Eye damage
        - Permanent blindness
        - Severe skin burns
        - Retinal injury
        - Fire ignition
      controls: |-
        - Laser safety windows
        - Door interlocks (front, top)
        - Safety window interlocks
        - Emergency stop button
        - Auto-stop when opened
      current_rating: "High"
      additional_controls: |-
        - Mandatory laser safety training
        - NEVER defeat interlocks
        - NEVER operate with doors/covers open
        - Regular interlock testing
        - Class 4 warning signage
        - Tag out if damaged
      residual_rating: "Low"
    - task: "Operating with defeated or damaged safety systems"
      hazards: "Direct exposure to Class 4 laser"
      harm: |-
        - Severe eye injury
        - Permanent blindness
        - Severe burns
        - Fire hazard
      controls: |-
        - Prohibition policy
        - Equipment design prevents easy bypass
      current_rating: "Very High"
      additional_controls: |-
        - ABSOLUTE PROHIBITION
        - Disciplinary action
        - Lock out if damaged
        - Annual verification by qualified technician
        - Residual rating of Low applies only while the absolute prohibition is maintained - this scenario must not occur
      residual_rating: "Low"
    - task: "Laser processing of materials"
      hazards: "Fire and ignition of materials"
      harm: |-
        - Burns
        - Fire
        - Smoke inhalation
        - Property damage
      controls: |-
        - 5 flame sensors
        - AI fire detection
        - Flame-retardant chamber
        - Emergency stop
        - Audible alarm
      current_rating: "Medium"
      additional_controls: |-
        - NEVER leave unattended
        - Fire extinguisher nearby (CO₂/dry powder)
        - Clear flammable materials
        - Emergency procedures
        - Regular fire sensor testing
      residual_rating: "Low"
    - task: "High-temperature operation"
      hazards: "Thermal burns (350°C nozzle, 65°C chamber)"
      harm: |-
        - Severe burns to hands, arms
        - Skin damage from contact with nozzle, heat bed, or chamber walls
      controls: |-
        - Warning labels
        - Limited access during operation
        - Cool-down period
      current_rating: "Medium"
      additional_controls: |-
        - Heat-resistant gloves available
        - Cool-down procedures
        - Training on hot surfaces
      residual_rating: "Low"
    - task: "3D printing with any filament type (PLA, PETG, ABS, ASA, nylon, etc.)"
      hazards: "Ultrafine particle (UFP) emissions. All FDM filaments emit particles smaller than 100 nm at rates of approximately 10⁸ to 10¹² particles/min. Published research has detected trace metals (Cr, As, Pb, Cd, Co) in particulate fraction"
      harm: |-
        - Deep lung penetration of respirable UFPs
        - Respiratory inflammation and reduced lung function
        - Increased asthma risk
        - Chronic respiratory disease with repeated exposure
        - US EPA characterises exposure profile as comparable to traffic-related air pollution
      controls: |-
        - Fully enclosed build chamber contains emissions during printing
        - Internal activated carbon filter (recirculates chamber air; active by default for ABS, ASA, PC, PA; bypasses for PLA, PETG)
        - Bambu Lab Smoke Purifier connected to exhaust: G4 pre-filter, F8 filter, activated carbon (1200 mg/g adsorption capacity), HEPA H13 (captures 99% of particles ≥0.3 µm)
        - Fresh air supply to printer room
      current_rating: "Medium"
      additional_controls: |-
        - Complete mechanical extraction upgrade for printer room to provide adequate air changes per hour
        - Keep enclosure closed during printing and allow cooling before opening to prevent burst release of accumulated particles
        - Enable internal carbon filter for ALL filament types, not just high-temperature materials
        - Avoid extended occupancy of printer room during long prints until extraction upgrade complete
        - Regular cleaning of printer internals (fans, chamber surfaces) to remove deposited particulate
        - Consider VOC/PM2.5 monitor to verify extraction effectiveness
      residual_rating: "Low"
    - task: "3D printing with lower-emission filaments (PLA, PETG)"
      hazards: "Volatile organic compound (VOC) emissions. PLA emits lactide and methyl methacrylate. PETG emits ethylbenzene (IARC Group 2B - possibly carcinogenic)"
      harm: |-
        - Eye, nose and throat irritation
        - Headaches, coughing, nausea
        - Potential carcinogenic risk from ethylbenzene (PETG) with chronic exposure
        - Total VOC concentrations may exceed indoor air quality guidelines in poorly ventilated settings
      controls: |-
        - Fully enclosed build chamber
        - Bambu Lab Smoke Purifier with activated carbon stage addresses VOCs in exhaust path
        - Fresh air supply to printer room
      current_rating: "Medium"
      additional_controls: |-
        - Preferential use of PLA and PETG where material properties allow
        - Ensure Smoke Purifier is connected and operating for every print
        - Complete room extraction upgrade
        - Replace activated carbon filters per manufacturer schedule (adsorption capacity degrades over time)
        - Monitor for symptoms of irritation during printing
      residual_rating: "Low"
    - task: "3D printing with higher-emission filaments (ABS, ASA, nylon, PC, composites)"
      hazards: "Elevated VOC emissions. ABS/ASA emit styrene (IARC Group 2B), formaldehyde (IARC Group 1 - carcinogenic), and acetaldehyde at 3-4x the rate of PLA. Nylon emits caprolactam (respiratory irritant). High-temperature composites (PC, PPS) produce significantly increased emissions at elevated extrusion temperatures"
      harm: |-
        - Respiratory damage and chronic lung disease
        - Carcinogenic risk from styrene and formaldehyde exposure
        - Eye, nose and throat irritation
        - Headaches, nausea, dizziness
        - Sensitisation and allergic reactions
        - Potential for exceeding workplace exposure standards in poorly ventilated rooms
      controls: |-
        - Fully enclosed build chamber
        - Internal activated carbon filter active by default for these filament types
        - Bambu Lab Smoke Purifier with activated carbon and HEPA H13 in exhaust path
        - Fresh air supply to printer room
      current_rating: "High"
      additional_controls: |-
        - Use ABS/ASA/nylon/PC ONLY when specifically required by application; default to PLA or PETG
        - Room extraction system MUST be operational before printing with these materials
        - NEVER open enclosure during printing with high-emission filaments
        - Supervisor pre-approval required for ABS, ASA, PC, PPS, and composite filaments
        - Consult SDS for specific filament before use
        - Limit concurrent prints with high-emission materials
        - Avoid extended occupancy of printer room during and immediately after printing
        - Clean printer internals after ABS printing (deposits sticky residue on fans and internal surfaces)
        - Respiratory protection (P2/N95 minimum) if extraction is inadequate or under maintenance
      residual_rating: "Low"
    - task: "Laser cutting and engraving materials"
      hazards: "Fumes, smoke and particulates from thermal decomposition of materials by laser"
      harm: |-
        - Respiratory irritation and damage
        - Eye irritation
        - Toxic gas exposure (varies by material)
        - Long-term lung damage
      controls: |-
        - Exhaust system fitted
        - Air filtration via Smoke Purifier
        - Enclosed chamber
      current_rating: "Medium"
      additional_controls: |-
        - LEV connected and verified operational before laser use
        - Consult material SDS before laser processing
        - Use only approved materials (see prohibited list)
        - Respiratory protection available if required
        - Regular filter maintenance
      residual_rating: "Low"
    - task: "Processing prohibited or unknown materials (laser or 3D printing)"
      hazards: "Toxic fumes from incompatible materials. PVC releases hydrochloric acid gas. Polycarbonate produces bisphenol A. Unknown materials may produce unpredictable toxic decomposition products"
      harm: |-
        - Severe respiratory damage
        - Chemical poisoning
        - Hydrochloric acid burns to airways (PVC)
        - Endocrine disruption (polycarbonate)
      controls: |-
        - Material compatibility guidance from manufacturer
        - Ventilation system
      current_rating: "High"
      additional_controls: |-
        - PROHIBITED materials list enforced: PVC, vinyl, polycarbonate (laser), chlorinated plastics, materials of unknown composition
        - Pre-approval process for any new material not on approved list
        - Consult SDS before use of any unfamiliar material
        - Enhanced ventilation for all material processing
        - Prohibited list displayed at equipment
      residual_rating: "Low"
    - task: "General operation"
      hazards: "Electrical hazards (240V mains)"
      harm: |-
        - Electric shock
        - Electrocution
        - Burns
      controls: |-
        - RCD protection
        - Earthed equipment
        - Enclosed components
      current_rating: "Medium"
      additional_controls: |-
        - Regular testing (test & tag)
        - No wet conditions
        - Qualified electrician for repairs
        - Inspect power cords
      residual_rating: "Low"
    - task: "Material loading and operation"
      hazards: "Moving mechanical parts (XY gantry, print head, toolhead change mechanism)"
      harm: |-
        - Crushing injuries to fingers, hands
        - Entanglement
      controls: |-
        - Enclosed design
        - Door interlocks
        - Emergency stop accessible
      current_rating: "Low"
      additional_controls: |-
        - Keep hands clear during operation
        - Training on safe loading procedure
        - Wait for all motion to stop before opening doors
        - Residual risk assessed at the lowest end of the Low band
      residual_rating: "Low"
    - task: "Alarm systems"
      hazards: "Acoustic hazards from fire detection alarm and error alerts"
      harm: |-
        - Hearing discomfort
        - Startle response
      controls: |-
        - Audible alarm fitted
      current_rating: "Low"
      additional_controls: |-
        - Appropriate alarm volume setting
        - Training on alarm meaning and response
        - Hearing protection available if prolonged exposure during fault condition
        - Residual risk assessed at the lowest end of the Low band
      residual_rating: "Low"
    - task: "Unattended operation (3D printing)"
      hazards: "Extended unattended prints with potential for fire, equipment failure, or emission accumulation"
      harm: |-
        - Fire with delayed response
        - Equipment damage
        - UFP/VOC accumulation in occupied room
        - Delayed emergency response
      controls: |-
        - Camera monitoring capability
        - 5 flame sensors and AI fire detection
        - Enclosed chamber
        - Smoke Purifier filtration
      current_rating: "High"
      additional_controls: |-
        - PROHIBITION of unattended laser operations (laser must have operator present at all times)
        - 3D print operations: remote camera monitoring acceptable if flame detection and auto-stop verified functional
        - Sign-in/sign-out procedures
        - Ensure extraction and filtration running for duration of print
        - Room should not be continuously occupied during long unattended prints unless extraction verified adequate
      residual_rating: "Low"
