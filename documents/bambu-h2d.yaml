  description: "Risk assessment and safe work procedure for the Bambu Lab H2D 3D printer with 10W Class 4 laser module, covering laser radiation, thermal, electrical, mechanical, fire, and airborne emission hazards (UFPs and VOCs) from FDM printing and laser operations."
