name: Deploy Jekyll site to Pages

# The RA/SWP pages, Word documents and PDFs are ALL generated from the YAML
# source files in documents/ by docgen/render.py:
#   1. render web markdown into the (gitignored) collection dirs
#   2. jekyll build
#   3. render the official USyd Word .docx forms
#   4. convert the .docx to PDF with headless LibreOffice
#   5. publish docx + pdfs inside the Pages artifact (download buttons link there)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docgen/requirements.txt

      - name: Install docgen dependencies
        run: pip install -r docgen/requirements.txt

      - name: Generate web pages from documents/*.yaml
        run: python docgen/render.py --all --web

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "$BASE_PATH"
        env:
          JEKYLL_ENV: production
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer

      - name: Generate Word documents and PDFs
        run: python docgen/render.py --all --pdf

      - name: Publish docx and PDFs into the site
        run: |
          mkdir -p _site/docx _site/pdfs
          cp -r docgen/out/docx/. _site/docx/
          cp -r docgen/out/pdfs/. _site/pdfs/
          echo "Published document downloads:"
          find _site/docx _site/pdfs -type f | sort

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
