name: Generate Draft Safety Documents

# Triggered when someone comments on an issue.
# Only fires when the comment contains "/generate-docs" AND the commenter
# has write access to the repository (owner, member, or collaborator).
# This limits Anthropic API usage to trusted team members.
on:
  issue_comment:
    types: [created]

jobs:
  generate:
    # Guard conditions:
    #   1. The comment is on an issue, not a pull request
    #   2. The comment body contains the trigger command
    #   3. The commenter has write access (owner / org member / repo collaborator)
    if: >-
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/generate-docs') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')

    runs-on: ubuntu-latest

    permissions:
      contents: write       # push branch with generated files
      pull-requests: write  # create draft PR
      issues: write         # comment on the issue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install anthropic

      # Add a 👍 reaction to the trigger comment so the requester gets
      # immediate feedback that the command was recognised.
      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -X POST -f content='+1'

      - name: Generate RA and SWP documents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/generate_documents.py

      - name: Create branch and commit generated files
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          SLUG=$(cat /tmp/doc_slug.txt)
          EQUIP=$(cat /tmp/doc_name.txt)
          BRANCH="draft/docs-issue-${ISSUE_NUM}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "_risk_assessments/${SLUG}.md" "_safe_work_procedures/${SLUG}.md"
          git commit -m "Add draft RA and SWP for ${EQUIP} (issue #${ISSUE_NUM})"
          git push origin "$BRANCH"

      - name: Create draft PR and notify issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          SLUG=$(cat /tmp/doc_slug.txt)
          EQUIP=$(cat /tmp/doc_name.txt)
          BRANCH="draft/docs-issue-${ISSUE_NUM}"

          PR_URL=$(gh pr create \
            --title "Draft: RA & SWP for ${EQUIP}" \
            --base main \
            --head "$BRANCH" \
            --draft \
            --body "Auto-generated draft Risk Assessment and Safe Work Procedure for **${EQUIP}**.

Closes #${ISSUE_NUM}

> ⚠️ Generated by Claude AI from the information in the linked issue. **Must be reviewed and verified by a qualified person before merging or use.**

## Review checklist

- [ ] Risk Assessment reviewed for completeness and accuracy
- [ ] Safe Work Procedure reviewed for completeness and accuracy
- [ ] All technical specifications verified against manufacturer documentation
- [ ] Hazard table has sufficient scenarios (5–10 minimum)
- [ ] Emergency procedures are accurate and location-specific
- [ ] All placeholder values replaced with real information
- [ ] Status updated from \`Draft\` to \`Approved\` in front matter when ready")

          gh issue comment "${ISSUE_NUM}" --body "📄 Draft documents generated and submitted for review: ${PR_URL}

> ⚠️ These documents were generated by Claude AI based on the issue description. They **require expert review** by a qualified person before use or approval."
