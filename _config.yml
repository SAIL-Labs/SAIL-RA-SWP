title: SAIL Laboratory Safety Documentation
description: Risk Assessments and Safe Work Procedures for Laboratory Equipment
theme: minima
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# GitHub Pages settings
url: "https://sail-labs.github.io"
baseurl: "/SAIL-RA-SWP"

# Navigation
header_pages:
  - index.md

# Collections
# NOTE: _risk_assessments/ and _safe_work_procedures/ are GENERATED from
# documents/*.yaml by docgen/render.py — never edit the .md files by hand.
collections:
  risk_assessments:
    output: true
    permalink: /risk-assessments/:name/
  safe_work_procedures:
    output: true
    permalink: /safe-work-procedures/:name/

# Exclude from processing
exclude:
  - README.md
  - CLAUDE.md
  - DOCUMENTATION.md
  - SYSTEM_PROMPTS.md
  - ROUTINE_SETUP.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - node_modules/
  - serve.sh
  - documents/
  - docgen/
